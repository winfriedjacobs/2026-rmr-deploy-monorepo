  #   environment:
  #     DB_TYPE: sqlite
  #     DB_PATH: sdm_backend_4a.sqlite3

  #   ports:
  #     - "8000:3000"
  #   # Optional: Add environment variables if the image requires them
  #   # environment:
  #   #   - NODE_ENV=production


  nginx-proxy:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-rmr-pdfs-prod
