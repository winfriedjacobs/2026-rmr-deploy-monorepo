services:
  web-rmr-pdfs-prod:
    image: ghcr.io/winfriedjacobs/2026-rmr-monorepo/web-rmr-pdfs:latest
    # image: ghcr.io/winfriedjacobs/2026-rmr-monorepo/web-rmr-pdfs:sha-b4493de892ef1eadad15b8d3b47e7051213f420d
    restart: no # unless-stopped

    volumes:
      - ./pdfs:/app/pdfs:z  # :z for SELinux systems

    environment:
      DB_TYPE: oracle
      DB_CONNECT_STRING: fedora-w540/FREEPDB1
      DB_USER: system
      DB_PASSWORD: DeinSicheresPasswort123

    # No ports exposed to host, only internal port 3000

    deploy:
      replicas: 4
      endpoint_mode: dnsrr


  # web-rmr-pdfs-dev:
  #   image: ghcr.io/winfriedjacobs/2026-rmr-monorepo/web-rmr-pdfs:main
  #   container_name: web-rmr-pdfs-dev
  #   # restart: no # unless-stopped

  #   volumes:
  #     - ./pdfs:/app/pdfs:z  # :z for SELinux systems
